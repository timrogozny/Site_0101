<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аксессуары | 0101 CONCEPT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Visitor';
            src: url('fonts/visitor2.otf') format('opentype'); 
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        .logo {
            font-family: 'Visitor', sans-serif;
            font-size: 38px;
            text-decoration: none;
            color: #000000 !important;
            display: block;
            text-align: center;
        }

        .header-icons a img {
            width: 26px;
            height: 26px;
        }

        .navbar-nav .nav-link {
            color: #000000 !important;
            font-weight: 400;
            font-size: 16px;
            transition: color 0.3s;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #cccccc !important;
        }

        .bags-grid {
            padding: 40px 0 80px 0;
        }
        .bag-item {
            text-align: center;
        }

        .bag-item img {
            display: block;
            margin: 0 auto;
        }

        .bag-info {
            text-align: center;
        }
        .bag-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .bag-name {
            font-weight: 500;
            font-size: 16px;
            margin: 0;
        }

        .bag-price {
            font-size: 14px;
            color: #555555;
            margin: 0;
        }

        .pagination-container {
            margin: 60px 0;
        }

        .pagination .page-link {
            color: #000;
            border: none;
            background-color: transparent;
            font-weight: 400;
            transition: color 0.3s;
        }

        .pagination .page-link:hover {
            color: #555555;
        }

        .pagination .page-item.active .page-link {
            font-weight: 600;
            color: #000;
            background-color: transparent;
            border-color: transparent;
        }

        footer {
            background-color: #000000;
            color: #ffffff;
            height: 83px;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 300;
            font-size: 14px;
            line-height: 20px;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #cccccc;
        }

        .social-icons img {
            width: 44px;
            height: 44px;
        }


        
        .breadcrumb-item a {
            color: #000000 !important;
            text-decoration: none;
            font-size: 14px;
        }
        .breadcrumb-item.active {
            color: #555555 !important;
            font-size: 14px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="container-fluid pt-4">
        <div class="row align-items-center mb-3">
            <div class="col d-flex justify-content-end header-icons gap-4 gap-md-5 me-5 me-lg-0">
                <a href="#"><img src="images/search.png" alt="Поиск"></a>
                <a href="#"><img src="images/cart.png" alt="Корзина"></a>
                <a href="#"><img src="images/lk.png" alt="Личный кабинет"></a>
            </div>
        </div>
        <div class="row">
            <div class="col-12 text-center mb-2">
                <a href="index.html" class="logo">01/01 CONCEPT</a>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid justify-content-center">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <ul class="navbar-nav gap-2 gap-xl-5">
                        <li class="nav-item">
                            <a class="nav-link" href="bags.html">Новый дроп</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="bagsGRID.html">Сумки</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Бренды</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="bags.html">Аксессуары</a>                            
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="showroom.html">Шоурум</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">О нас</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Контакты</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

        <li class="breadcrumb-item"><a href="#">Главная</a></li>

    <main class="container-fluid bags-grid">
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col">
                <div class="bag-item">
                    <img src="images/bracelet_Монтажная область 1-01.png" class="img-fluid" alt="Van Cleef 5 Motif">
                    <div class="bag-info">
                        <p class="bag-name">Van Cleef 5 Motif</p>
                        <p class="bag-price">450.000₽</p>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="bag-item position-relative">

                    <span class="badge bg-danger position-absolute top-0 end-0 m-2"
                        style="font-size: 16px; padding: 8px 14px;">
                        SALE
                    </span>

                    <img src="images/bracelet_Монтажная область 1-02.png" class="img-fluid" alt="Dior Friendship">

                    <div class="bag-info">
                        <p class="bag-name">Dior Friendship</p>

                        <p class="bag-price mb-0">
                            <span style="text-decoration: line-through; color: #999; margin-right: 8px;">
                                39.990₽
                            </span>
                            <span style="font-weight: 600; color: #d00;">
                                29.990₽
                            </span>
                        </p>
                    </div>

                </div>
            </div>
            <div class="col">
                <div class="bag-item">
                    <img src="images/bracelet_Монтажная область 1-03.png" class="img-fluid" alt="Сartier Love">
                    <div class="bag-info">
                        <p class="bag-name">Сartier Love</p>
                        <p class="bag-price">169.990₽</p>
                    </div>
                </div>
            </div>
            <div class="col d-none d-lg-block">
                <div class="bag-item">
                    </div>
            </div>
        </div>
    </main>

    <div class="container-fluid pagination-container">
        <nav aria-label="Пагинация">
            <ul class="pagination justify-content-center">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Предыдущая">
                        &#8592;
                    </a>
                </li>
                <li class="page-item active" aria-current="page"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Следующая">
                        &#8594;
                    </a>
                </li>
            </ul>
        </nav>

    <footer class="mt-auto d-flex flex-column flex-md-row justify-content-md-between align-items-center py-3">
        <div class="footer-links d-flex gap-4 gap-lg-5 ms-md-5 mb-2 mb-md-0">
            <a href="#">Политика конфиденциальности</a>
            <a href="#">Вопросы</a>
            <a href="#">Контакты</a>
        </div>
        <div class="social-icons d-flex gap-4 gap-lg-5 me-md-5">
            <img src="images/tg.png" alt="Telegram">
            <img src="images/vk.png" alt="VK">
            <img src="images/inst.png" alt="Instagram">
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
